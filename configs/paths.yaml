project:
  package_name: ozon_similar_products

configs:
  root_dir: configs
  paths: configs/paths.yaml
  data: configs/data.yaml
  baseline: configs/baseline.yaml
  evaluation: configs/evaluation.yaml

data:
  raw_dir: data/raw
  raw_archives_dir: data/raw/archives
  product_information_dir: data/raw/product_information
  user_actions_dir: data/raw/user_actions
  processed_dir: data/processed

outputs:
  root_dir: outputs
  recommendations_dir: outputs

source:
  package_dir: src/ozon_similar_products
  required_layer_dirs:
    - src/ozon_similar_products/data
    - src/ozon_similar_products/preprocessing
    - src/ozon_similar_products/features
    - src/ozon_similar_products/retrieval
    - src/ozon_similar_products/diagnostics
    - src/ozon_similar_products/business
    - src/ozon_similar_products/evaluation
    - src/ozon_similar_products/output
    - src/ozon_similar_products/serving
    - src/ozon_similar_products/cli
    - src/ozon_similar_products/pipeline
  optional_future_layer_dirs:
    - src/ozon_similar_products/graph
    - src/ozon_similar_products/scoring
    - src/ozon_similar_products/ranking
  required_modules:
    - src/ozon_similar_products/__init__.py
    - src/ozon_similar_products/config.py
    - src/ozon_similar_products/paths.py
    - src/ozon_similar_products/data/__init__.py
    - src/ozon_similar_products/data/archives.py
    - src/ozon_similar_products/data/config.py
    - src/ozon_similar_products/data/partitions.py
    - src/ozon_similar_products/data/readers.py
    - src/ozon_similar_products/data/schemas.py
    - src/ozon_similar_products/data/validation.py
    - src/ozon_similar_products/diagnostics/__init__.py
    - src/ozon_similar_products/diagnostics/profiling.py
    - src/ozon_similar_products/diagnostics/session_checks.py
    - src/ozon_similar_products/business/__init__.py
    - src/ozon_similar_products/business/fallback.py
    - src/ozon_similar_products/evaluation/__init__.py
    - src/ozon_similar_products/evaluation/split.py
    - src/ozon_similar_products/evaluation/metrics.py
    - src/ozon_similar_products/evaluation/scorecard.py
    - src/ozon_similar_products/serving/__init__.py
    - src/ozon_similar_products/serving/lookup.py
    - src/ozon_similar_products/output/lookup.py
    - src/ozon_similar_products/cli/__init__.py
    - src/ozon_similar_products/cli/run_pipeline.py
    - src/ozon_similar_products/cli/run_full.py
    - src/ozon_similar_products/cli/run_tune.py
    - src/ozon_similar_products/cli/preview_recommendations.py

project_dirs:
  - configs
  - data/raw/archives
  - data/raw/product_information
  - data/raw/user_actions
  - data/processed
  - docs
  - notebooks
  - outputs
  - scripts
  - tests
