project:
  package_name: ozon_similar_products

configs:
  root_dir: configs
  paths: configs/paths.yaml
  data: configs/data.yaml
  baseline: configs/baseline.yaml
  evaluation: configs/evaluation.yaml

data:
  raw_dir: data/raw
  raw_archives_dir: data/raw/archives
  product_information_dir: data/raw/product_information
  user_actions_dir: data/raw/user_actions
  interim_dir: data/interim
  processed_dir: data/processed
  samples_dir: data/samples

outputs:
  root_dir: outputs
  recommendations_dir: outputs/recommendations
  reports_dir: outputs/reports
  figures_dir: outputs/figures

source:
  package_dir: src/ozon_similar_products
  future_layer_dirs:
    - src/ozon_similar_products/business
    - src/ozon_similar_products/evaluation
    - src/ozon_similar_products/features
    - src/ozon_similar_products/output
    - src/ozon_similar_products/preprocessing
    - src/ozon_similar_products/retrieval
  required_modules:
    - src/ozon_similar_products/__init__.py
    - src/ozon_similar_products/config.py
    - src/ozon_similar_products/paths.py
    - src/ozon_similar_products/data/__init__.py
    - src/ozon_similar_products/data/loaders.py
    - src/ozon_similar_products/data/schemas.py
    - src/ozon_similar_products/data/validation.py

project_dirs:
  - configs
  - data/raw/archives
  - data/raw/product_information
  - data/raw/user_actions
  - data/interim
  - data/processed
  - data/samples
  - docs
  - notebooks
  - outputs/recommendations
  - outputs/reports
  - outputs/figures
  - scripts
  - tests
