# Optional widget context tuning.
# Replace example widget names with real widget_name values from EDA before serious experiments.
objective:
  # Main business metric: whether recommendations catch future to_cart relations.
  primary_metric: to_cart_hit_rate_at_k
  supporting_metrics:
    - strong_ndcg_at_k
    - strong_recall_at_k
    - strong_mrr_at_k
    - coverage_at_k
    - to_cart_recall_at_k
  penalty_metrics:
    - popularity_bias_at_k
  constraints:
    min_coverage_at_k: 0.10

parameters:
  graph.widget_context.enabled:
    type: choice
    values: [ true ]
  graph.widget_context.use:
    type: choice
    values: [ target ]
  graph.widget_context.default_weight:
    type: choice
    values: [ 0.8, 1.0, 1.2 ]
  graph.widget_context.unknown_weight:
    type: choice
    values: [ 0.5, 0.8, 1.0 ]
  graph.widget_context.weights.search:
    type: choice
    values: [ 0.7, 0.9, 1.0 ]
  graph.widget_context.weights.product_card:
    type: choice
    values: [ 1.0, 1.1, 1.2 ]
  graph.widget_context.weights.similar_items:
    type: choice
    values: [ 1.0, 1.2, 1.5 ]
