# Tune popularity normalization. Goal: reduce popular-only recommendations without killing quality.
objective:
  # Main business metric: whether recommendations catch future to_cart relations.
  primary_metric: to_cart_hit_rate_at_k
  supporting_metrics:
    - strong_ndcg_at_k
    - strong_recall_at_k
    - strong_mrr_at_k
    - coverage_at_k
    - to_cart_recall_at_k
  penalty_metrics:
    - popularity_bias_at_k
  constraints:
    min_coverage_at_k: 0.10

parameters:
  scoring.normalize_by_item_popularity:
    type: choice
    values: [ false, true ]
  scoring.popularity_normalization.popularity_column:
    type: choice
    values: [ unique_users ]
  scoring.popularity_normalization.smoothing:
    type: choice
    values: [ 1.0, 10.0, 100.0 ]
  scoring.popularity_normalization.power:
    type: choice
    values: [ 0.25, 0.5, 0.75, 1.0 ]
