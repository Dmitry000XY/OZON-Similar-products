objective:
  primary_metric: to_cart_hit_rate_at_k
  supporting_metrics:
    - strong_ndcg_at_k
    - strong_recall_at_k
    - strong_mrr_at_k
    - coverage_at_k
    - to_cart_recall_at_k
    - fallback_hit_rate_at_k
  penalty_metrics:
    - popularity_bias_at_k
    - fallback_global_share_at_k
  constraints:
    min_coverage_at_k: 0.01

parameters:
  scoring.method:
    type: choice
    values:
      - calibrated_multichannel

  scoring.business_weights.view:
    type: choice
    values: [0.5, 1.0, 1.5]

  scoring.business_weights.click:
    type: choice
    values: [2.0, 3.0, 4.0]

  scoring.business_weights.favorite:
    type: choice
    values: [4.0, 6.0, 8.0]

  scoring.business_weights.to_cart:
    type: choice
    values: [6.0, 8.0, 10.0]

  scoring.beta:
    type: choice
    values: [0.25, 0.5, 0.75]

  scoring.normalize_by_item_popularity:
    type: choice
    values: [false, true]

  scoring.popularity_normalization.power:
    type: choice
    values: [0.25, 0.5, 0.75]

  topk.top_k:
    type: choice
    values: [20]

  business.fallback.enabled:
    type: choice
    values: [false, true]

  business.fallback.enable_category_type:
    type: choice
    values: [true]

  business.fallback.enable_category:
    type: choice
    values: [true]

  business.fallback.enable_type:
    type: choice
    values: [true]

  business.fallback.enable_brand:
    type: choice
    values: [false, true]

  business.fallback.enable_global:
    type: choice
    values: [true]

  business.fallback.include_cold_start_items:
    type: choice
    values: [false, true]

  business.fallback.include_catalog_only_sources:
    type: choice
    values: [false]

  business.fallback.min_item_events:
    type: choice
    values: [1, 2, 5]

  business.fallback.metadata_candidate_pool_size:
    type: choice
    values: [50, 100, 200]

  business.fallback.global_candidate_pool_size:
    type: choice
    values: [100, 200, 500]
