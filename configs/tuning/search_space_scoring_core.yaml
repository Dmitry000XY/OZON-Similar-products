objective:
  primary_metric: to_cart_hit_rate_at_k
  supporting_metrics:
    - ndcg_at_k
    - recall_at_k
    - mrr_at_k
    - coverage_at_k
    - to_cart_recall_at_k
  penalty_metrics:
    - popularity_bias_at_k
  constraints:
    min_coverage_at_k: 0.6
    max_popularity_bias_at_k: 0.15

parameters:
  pipeline.lookback_days:
    type: choice
    values: [4]

  topk.top_k:
    type: choice
    values: [20]

  business.fallback.enabled:
    type: choice
    values: [false]

  scoring.business_weights.view:
    type: float_range
    min: 0.0
    max: 2.0
    step: 0.25

  scoring.business_weights.click:
    type: float_range
    min: 1.0
    max: 6.0
    step: 0.5

  scoring.business_weights.favorite:
    type: float_range
    min: 4.0
    max: 20.0
    step: 1.0

  scoring.business_weights.to_cart:
    type: float_range
    min: 4.0
    max: 20.0
    step: 1.0

  scoring.beta:
    type: choice
    values: [0.25, 0.5, 0.75, 1.0]