objective:
  primary_metric: to_cart_hit_rate_at_k
  supporting_metrics:
    - strong_ndcg_at_k
    - strong_recall_at_k
    - strong_mrr_at_k
    - coverage_at_k
    - to_cart_recall_at_k
    - fallback_hit_rate_at_k
  penalty_metrics:
    - popularity_bias_at_k
    - fallback_global_share_at_k
  constraints:
    min_coverage_at_k: 0.0

parameters:
  pipeline.lookback_days:
    type: choice
    values: [ 1 ]

  topk.top_k:
    type: choice
    values: [ 10, 20, 50 ]

  scoring.business_weights.view:
    type: float_range
    min: 0.0
    max: 2.0
    step: 0.25

  scoring.business_weights.click:
    type: float_range
    min: 0.0
    max: 8.0
    step: 0.5

  scoring.business_weights.favorite:
    type: float_range
    min: 0.0
    max: 12.0
    step: 0.5

  scoring.business_weights.to_cart:
    type: float_range
    min: 0.0
    max: 20.0
    step: 1.0

  scoring.beta:
    type: float_range
    min: 0.0
    max: 1.0
    step: 0.25

  scoring.min_pair_count:
    type: int_range
    min: 1
    max: 3
    step: 1

  scoring.min_unique_users:
    type: int_range
    min: 1
    max: 3
    step: 1

  scoring.min_unique_sessions:
    type: int_range
    min: 1
    max: 3
    step: 1

  graph.widget_context.enabled:
    type: choice
    values: [ false, true ]

  graph.widget_context.use:
    type: choice
    values: [ target ]

  graph.widget_context.default_weight:
    type: choice
    values: [ 1.0 ]

  graph.widget_context.unknown_weight:
    type: choice
    values: [ 1.0 ]

  graph.widget_context.weights.search_catalog_listing:
    type: choice
    values: [ 0.95, 1.0, 1.05 ]

  graph.widget_context.weights.product_detailed_page:
    type: choice
    values: [ 1.0, 1.05, 1.1, 1.2 ]

  scoring.count_source:
    type: choice
    values: [ raw, weighted ]

  scoring.normalize_by_item_popularity:
    type: choice
    values: [ false, true ]

  scoring.popularity_normalization.power:
    type: float_range
    min: 0.0
    max: 1.0
    step: 0.25

  scoring.popularity_normalization.smoothing:
    type: choice
    values: [ 0.1, 1.0, 10.0 ]

  business.fallback.enabled:
    type: choice
    values: [ false, true ]

  business.fallback.enable_category_type:
    type: choice
    values: [ true ]

  business.fallback.enable_category:
    type: choice
    values: [ true ]

  business.fallback.enable_type:
    type: choice
    values: [ true ]

  business.fallback.enable_brand:
    type: choice
    values: [ false, true ]

  business.fallback.enable_global:
    type: choice
    values: [ true ]

  business.fallback.include_cold_start_items:
    type: choice
    values: [ false, true ]

  business.fallback.include_catalog_only_sources:
    type: choice
    values: [ false ]

  business.fallback.min_item_events:
    type: choice
    values: [ 1, 2, 5 ]

  business.fallback.metadata_candidate_pool_size:
    type: choice
    values: [ 50, 100, 200 ]

  business.fallback.global_candidate_pool_size:
    type: choice
    values: [ 100, 200, 500 ]

  pipeline.session_timeout_minutes:
    type: int_range
    min: 10
    max: 30
    step: 5
