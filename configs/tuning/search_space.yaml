objective:
  primary_metric: to_cart_hit_rate_at_k
  tie_breakers:
    - ndcg_at_k
    - weighted_recall_at_k
    - coverage_at_k
  constraints:
    min_coverage_at_k: 0.0
  penalty_metrics:
    - popularity_bias_at_k

parameters:
  pipeline.lookback_days:
    type: choice
    values: [7, 14, 30]

  topk.top_k:
    type: choice
    values: [10, 20, 50]

  scoring.business_weights.click:
    type: choice
    values: [2.0, 3.0, 5.0]

  scoring.business_weights.to_cart:
    type: choice
    values: [8.0, 10.0, 12.0]

  scoring.min_unique_users:
    type: choice
    values: [1, 2, 3]

  scoring.normalize_by_item_popularity:
    type: choice
    values: [false, true]
